<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280" role="img" aria-labelledby="title desc">
  <title id="title">ZeroLore logo with wordmark</title>
  <desc id="desc">ZeroLore symbol on the left with the ZEROLORE wordmark on the right.</desc>

  <rect width="1200" height="280" fill="none"/>

  <image
    href="zeroloreLogoToken.png"
    x="48"
    y="32"
    width="250"
    height="156"
    preserveAspectRatio="xMidYMid meet"
  />

  <text
    x="350"
    y="133"
    fill="#f4f2ee"
    font-family="Cinzel, Georgia, serif"
    font-size="104"
    font-weight="700"
    letter-spacing="16"
    text-rendering="geometricPrecision"
    dominant-baseline="middle"
  >
    ZEROLORE
  </text>
</svg>
