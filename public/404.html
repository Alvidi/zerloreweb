<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZeroLore | Page Not Found</title>
    <meta name="robots" content="noindex, nofollow" />
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f1117;
        color: #f3f4f6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(197, 167, 92, 0.2), transparent 30%),
          linear-gradient(180deg, #131722 0%, #0f1117 100%);
      }

      main {
        width: min(42rem, calc(100% - 2rem));
        padding: 2rem;
        border: 1px solid rgba(243, 244, 246, 0.12);
        border-radius: 1rem;
        background: rgba(15, 17, 23, 0.92);
        box-shadow: 0 1.5rem 3rem rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 1rem;
        font-size: clamp(2rem, 4vw, 3rem);
        line-height: 1.1;
      }

      p {
        margin: 0 0 1rem;
        line-height: 1.6;
      }

      a {
        color: #f3f4f6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Page not found / Pagina no encontrada</h1>
      <p>
        The requested route does not exist on ZeroLore.
        Esta ruta no existe en ZeroLore.
      </p>
      <p>
        <a href="/">Return to the homepage / Volver al inicio</a>
      </p>
    </main>
  </body>
</html>
